version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: her-claw-backend
    ports:
      - "8001:8000"
    volumes:
      - ./data:/app/data
    env_file: .env
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: her-claw-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
